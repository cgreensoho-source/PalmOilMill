name: sampling_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  shared_preferences: ^2.5.4
  sqflite: ^2.3.0
  path: ^1.8.3
  image_picker: ^1.0.7
  mobile_scanner: ^3.5.2
  geolocator: ^14.0.2
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  connectivity_plus: ^5.0.0
  permission_handler: ^11.3.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"